<!DOCTYPE html>
<html>
<head>
  <title>Himalayan Store Praha</title>
  <meta charset="UTF-8">

  <style>
    body {
      font-family: Arial;
    background-color: #f5f5f5;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      background-color: green;
      color: white;
      padding: 15px;
      margin: 0;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin: 10px;
      width: 250px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Himalayan Store Praha</h1>

<div class="container">

  <div class="card">
    <img src="https://images.immediate.co.uk" />
    <h3>Basmati Rice</h3>
    <p>Premium long grain rice</p>
    <p class="price">1,100 Kč</p>
  </div>

  <div class="card">
    <img src="https://www.jiomart.com/images" />
    <h3>Kodo Millet (1 kg)</h3>
    <p>Organic kodo millet</p>
    <p class="price">150 Kč</p>
  </div>

  <div class="card">
    <img src="https://www.waiwai.com/wp-content" />
    <h3>Wai Wai Noodles</h3>
    <p>Popular Nepali instant noodles</p>
    <p class="price">25 Kč</p>
  </div>

</div>

</body>
</html>
